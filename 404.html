<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page not found | Tech of Our Own</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #0f172a;
      --muted: #475569;
      --accent: #2563eb;
      --accent-dark: #1e40af;
      --surface: #ffffff;
      --surface-alt: #f8fafc;
      --border: #e2e8f0;
      --shadow: 0 20px 45px rgba(15, 23, 42, 0.14);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Inter", "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: radial-gradient(circle at top left, #e0ebff, #ffffff 60%);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 32px;
      max-width: 720px;
      width: 100%;
      display: grid;
      gap: 16px;
      text-align: center;
    }

    h1 {
      font-size: clamp(2.1rem, 4vw, 2.6rem);
      line-height: 1.1;
    }

    p {
      color: var(--muted);
      font-size: 1.05rem;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-top: 8px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 18px;
      border-radius: 999px;
      border: none;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 10px 25px rgba(37, 99, 235, 0.22);
      background: var(--accent);
      color: #fff;
    }

    .button.secondary {
      background: #ffffff;
      color: var(--accent-dark);
      border: 1px solid var(--border);
      box-shadow: none;
    }

    small {
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>We couldn’t find that page.</h1>
    <p>The link may be outdated or the page might have moved. Use the shortcuts below to get back on track.</p>
    <div class="actions">
      <a class="button" href="/">Home</a>
      <a class="button secondary" href="/ourbox.html">OurBox</a>
      <a class="button secondary" href="https://github.com/techofourown/">Public GitHub</a>
    </div>
    <small>No trackers. No ads. Just static HTML.</small>
  </div>
</body>
</html>
